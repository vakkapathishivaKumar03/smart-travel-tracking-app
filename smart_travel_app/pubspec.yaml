name: smart_travel_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  intl: ^0.17.0
  geolocator: 14.0.2
  flutter_map: ^4.0.0
  latlong2: 0.8.2
  shared_preferences: ^2.5.4
  sqflite: ^2.4.1
  path: ^1.9.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  google_sign_in: ^7.2.0
  url_launcher: ^6.3.0

dependency_overrides:
  http: ^0.13.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/travelpilot_logo.png
    - assets/images/
